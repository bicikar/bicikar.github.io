<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirill Kuznetsov — CV World</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f23;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
        }

        .game-title {
            font-family: 'Press Start 2P', cursive;
            color: #ffd700;
            font-size: 16px;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px #000;
        }

        #gameCanvas {
            border: 4px solid #ffd700;
            border-radius: 8px;
            display: block;
        }

        .controls {
            font-family: 'Press Start 2P', cursive;
            color: #666;
            font-size: 8px;
            text-align: center;
            margin-top: 10px;
        }

        .controls span {
            color: #ffd700;
        }

        /* Collectible counter */
        .collectibles {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0,0,0,0.8);
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #ffd700;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #ffd700;
        }

        /* Secret found popup */
        .secret-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 15px;
            border: 3px solid #ffd700;
            text-align: center;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .secret-popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .secret-popup h2 {
            font-family: 'Press Start 2P', cursive;
            color: #ffd700;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .secret-popup p {
            color: #fff;
            font-size: 14px;
            line-height: 1.6;
        }

        .secret-popup .close-hint {
            color: #666;
            font-size: 10px;
            margin-top: 20px;
            font-family: 'Press Start 2P', cursive;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1 class="game-title">KIRILL KUZNETSOV</h1>
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <p class="controls"><span>WASD</span> or <span>ARROWS</span> to explore</p>

        <div class="collectibles" id="collectibles">Stars: 0/5</div>

        <div class="secret-popup" id="secretPopup">
            <h2>SECRET FOUND!</h2>
            <p id="secretText"></p>
            <p class="close-hint">Press any key</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game state
        const player = { x: 450, y: 520, size: 20, speed: 4 };
        const keys = { up: false, down: false, left: false, right: false };
        let collectedStars = 0;
        let showingSecret = false;

        // Color palette
        const colors = {
            grass: '#1a472a',
            grassLight: '#2d5a3d',
            path: '#c9a66b',
            pathDark: '#a8885a',
            water: '#1e5799',
            waterLight: '#3a7bd5',
            building: '#4a3728',
            roof: '#8b0000',
            wood: '#654321',
            gold: '#ffd700',
            text: '#ffffff',
            textDark: '#333333'
        };

        // Signs with CV information (positioned on map)
        const signs = [
            // Title area
            { x: 450, y: 80, text: 'DATA ENGINEER', size: 24, color: '#ffd700', font: 'Press Start 2P' },
            { x: 450, y: 110, text: 'Saint-Petersburg, Russia', size: 14, color: '#aaa' },

            // Education zone (left side)
            { x: 120, y: 180, text: 'EDUCATION', size: 16, color: '#ff6b6b', font: 'Press Start 2P' },

            { x: 120, y: 230, text: 'SPbU', size: 14, color: '#ffd700', font: 'Press Start 2P' },
            { x: 120, y: 255, text: "Bachelor's Degree", size: 12, color: '#fff' },
            { x: 120, y: 275, text: 'Mathematics & CS', size: 11, color: '#ccc' },
            { x: 120, y: 295, text: '2019 — 2023', size: 10, color: '#888' },

            { x: 120, y: 350, text: 'CS CENTER', size: 14, color: '#ffd700', font: 'Press Start 2P' },
            { x: 120, y: 375, text: 'Data Science Program', size: 12, color: '#fff' },
            { x: 120, y: 395, text: '2021 — 2022', size: 10, color: '#888' },

            { x: 120, y: 450, text: 'YSDA', size: 14, color: '#ffd700', font: 'Press Start 2P' },
            { x: 120, y: 475, text: 'Big Data Infrastructure', size: 12, color: '#fff' },
            { x: 120, y: 495, text: 'Yandex School', size: 11, color: '#ccc' },
            { x: 120, y: 515, text: '2022 — 2024', size: 10, color: '#888' },

            // Skills zone (center)
            { x: 450, y: 180, text: 'SKILLS', size: 16, color: '#4ecdc4', font: 'Press Start 2P' },

            { x: 350, y: 240, text: 'Python', size: 13, color: '#fff' },
            { x: 350, y: 290, text: 'C / C++', size: 13, color: '#fff' },
            { x: 350, y: 340, text: 'PostgreSQL', size: 13, color: '#fff' },

            { x: 550, y: 240, text: 'Machine Learning', size: 13, color: '#fff' },
            { x: 550, y: 290, text: 'Data Analysis', size: 13, color: '#fff' },
            { x: 550, y: 340, text: 'Algorithms', size: 13, color: '#fff' },

            // Projects zone (right side)
            { x: 780, y: 180, text: 'PROJECTS', size: 16, color: '#f97316', font: 'Press Start 2P' },

            { x: 780, y: 240, text: 'Protocol Detection Bot', size: 12, color: '#fff' },
            { x: 780, y: 260, text: 'OCR & Digit Recognition', size: 10, color: '#aaa' },

            { x: 780, y: 310, text: 'RRT* Path Planning', size: 12, color: '#fff' },
            { x: 780, y: 330, text: 'Algorithm Visualization', size: 10, color: '#aaa' },

            { x: 780, y: 380, text: 'EES Algorithm', size: 12, color: '#fff' },
            { x: 780, y: 400, text: 'Suboptimal Search', size: 10, color: '#aaa' },

            { x: 780, y: 450, text: 'Research Paper', size: 12, color: '#fff' },
            { x: 780, y: 470, text: 'arxiv.org/abs/1904.06571', size: 9, color: '#4ecdc4' },

            // Contact zone (bottom)
            { x: 450, y: 580, text: 'kirill.kz20010@gmail.com', size: 11, color: '#4ecdc4' },
            { x: 450, y: 605, text: 'github.com/bicikar', size: 11, color: '#aaa' },
        ];

        // Skill bars
        const skillBars = [
            { x: 350, y: 250, width: 80, level: 0.9, color: '#3498db' },  // Python
            { x: 350, y: 300, width: 80, level: 0.8, color: '#e74c3c' },  // C++
            { x: 350, y: 350, width: 80, level: 0.75, color: '#2ecc71' }, // PostgreSQL
            { x: 550, y: 250, width: 80, level: 0.85, color: '#9b59b6' }, // ML
            { x: 550, y: 300, width: 80, level: 0.8, color: '#f39c12' },  // Data Analysis
            { x: 550, y: 350, width: 80, level: 0.7, color: '#1abc9c' },  // Algorithms
        ];

        // Collectible stars
        const stars = [
            { x: 50, y: 150, collected: false },
            { x: 850, y: 150, collected: false },
            { x: 450, y: 400, collected: false },
            { x: 50, y: 550, collected: false },
            { x: 850, y: 550, collected: false },
        ];

        // Secret chest
        const chest = { x: 780, y: 520, opened: false, width: 40, height: 30 };

        // Decorative elements
        const trees = [
            { x: 30, y: 80 }, { x: 70, y: 120 }, { x: 200, y: 100 },
            { x: 700, y: 90 }, { x: 830, y: 80 }, { x: 870, y: 130 },
            { x: 20, y: 400 }, { x: 250, y: 550 }, { x: 650, y: 550 },
        ];

        const flowers = [];
        for (let i = 0; i < 30; i++) {
            flowers.push({
                x: Math.random() * 860 + 20,
                y: Math.random() * 400 + 130,
                color: ['#ff6b6b', '#ffd700', '#ff69b4', '#fff', '#4ecdc4'][Math.floor(Math.random() * 5)]
            });
        }

        // Zones for visual separation
        const zones = [
            { x: 20, y: 160, w: 200, h: 400, color: 'rgba(255, 107, 107, 0.1)', border: '#ff6b6b' },  // Education
            { x: 280, y: 160, w: 340, h: 220, color: 'rgba(78, 205, 196, 0.1)', border: '#4ecdc4' },  // Skills
            { x: 680, y: 160, w: 200, h: 360, color: 'rgba(249, 115, 22, 0.1)', border: '#f97316' },  // Projects
        ];

        // Draw functions
        function drawBackground() {
            // Base grass
            ctx.fillStyle = colors.grass;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grass texture
            ctx.fillStyle = colors.grassLight;
            for (let i = 0; i < 200; i++) {
                const x = (i * 47) % canvas.width;
                const y = (i * 31) % canvas.height;
                ctx.fillRect(x, y, 3, 8);
            }

            // Main path
            ctx.fillStyle = colors.path;
            ctx.fillRect(0, 550, canvas.width, 40);
            ctx.fillRect(420, 130, 60, 420);

            // Path texture
            ctx.fillStyle = colors.pathDark;
            for (let i = 0; i < 50; i++) {
                ctx.fillRect(i * 20, 555, 8, 5);
                ctx.fillRect(i * 20 + 5, 575, 6, 4);
            }
        }

        function drawZones() {
            zones.forEach(zone => {
                ctx.fillStyle = zone.color;
                ctx.fillRect(zone.x, zone.y, zone.w, zone.h);
                ctx.strokeStyle = zone.border;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.strokeRect(zone.x, zone.y, zone.w, zone.h);
                ctx.setLineDash([]);
            });
        }

        function drawTrees() {
            trees.forEach(tree => {
                // Trunk
                ctx.fillStyle = '#5d4037';
                ctx.fillRect(tree.x + 8, tree.y + 20, 10, 15);
                // Leaves
                ctx.fillStyle = '#2e7d32';
                ctx.beginPath();
                ctx.arc(tree.x + 13, tree.y + 12, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#388e3c';
                ctx.beginPath();
                ctx.arc(tree.x + 8, tree.y + 8, 12, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawFlowers() {
            flowers.forEach(flower => {
                // Skip if in zones
                const inZone = zones.some(z =>
                    flower.x > z.x && flower.x < z.x + z.w &&
                    flower.y > z.y && flower.y < z.y + z.h
                );
                if (inZone) return;

                ctx.fillStyle = flower.color;
                ctx.beginPath();
                ctx.arc(flower.x, flower.y, 4, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawSigns() {
            signs.forEach(sign => {
                ctx.font = `${sign.font ? '' : ''}${sign.size}px ${sign.font || 'Inter'}`;
                ctx.fillStyle = sign.color;
                ctx.textAlign = 'center';
                ctx.fillText(sign.text, sign.x, sign.y);
            });
        }

        function drawSkillBars() {
            skillBars.forEach(bar => {
                // Background
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(bar.x, bar.y, bar.width, 12);
                // Fill
                ctx.fillStyle = bar.color;
                ctx.fillRect(bar.x, bar.y, bar.width * bar.level, 12);
                // Border
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(bar.x, bar.y, bar.width, 12);
                // Percentage
                ctx.font = '10px Inter';
                ctx.fillStyle = '#fff';
                ctx.textAlign = 'left';
                ctx.fillText(`${Math.round(bar.level * 100)}%`, bar.x + bar.width + 5, bar.y + 10);
            });
        }

        function drawStars() {
            const time = Date.now() / 500;
            stars.forEach((star, i) => {
                if (star.collected) return;

                const bounce = Math.sin(time + i) * 3;
                const size = 15;

                // Glow
                ctx.beginPath();
                ctx.arc(star.x, star.y + bounce, size + 5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.fill();

                // Star shape
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                for (let j = 0; j < 5; j++) {
                    const angle = (j * 4 * Math.PI) / 5 - Math.PI / 2;
                    const x = star.x + Math.cos(angle) * size;
                    const y = star.y + bounce + Math.sin(angle) * size;
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();

                // Inner
                ctx.fillStyle = '#ffeb3b';
                ctx.beginPath();
                ctx.arc(star.x, star.y + bounce, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawChest() {
            const x = chest.x;
            const y = chest.y;

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(x - 2, y + 25, 44, 8);

            if (chest.opened) {
                // Open chest
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x, y + 10, 40, 20);
                // Lid open
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(x - 2, y - 5, 44, 15);
                // Gold inside
                ctx.fillStyle = '#ffd700';
                ctx.beginPath();
                ctx.arc(x + 12, y + 18, 5, 0, Math.PI * 2);
                ctx.arc(x + 22, y + 16, 4, 0, Math.PI * 2);
                ctx.arc(x + 30, y + 18, 5, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Closed chest
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(x, y, 40, 30);
                // Lid
                ctx.fillStyle = '#A0522D';
                ctx.fillRect(x - 2, y - 5, 44, 12);
                // Lock
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(x + 16, y + 8, 8, 10);
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(x + 20, y + 14, 2, 0, Math.PI * 2);
                ctx.fill();

                // Hint if player nearby
                const dist = Math.sqrt(Math.pow(player.x - x - 20, 2) + Math.pow(player.y - y - 15, 2));
                if (dist < 60) {
                    ctx.font = '10px Press Start 2P';
                    ctx.fillStyle = '#ffd700';
                    ctx.textAlign = 'center';
                    ctx.fillText('Press SPACE', x + 20, y - 20);
                }
            }
        }

        function drawPlayer() {
            const bounce = Math.sin(Date.now() / 150) * (keys.up || keys.down || keys.left || keys.right ? 2 : 0);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(player.x, player.y + 12, 12, 5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Body
            ctx.fillStyle = '#4a90d9';
            ctx.fillRect(player.x - 8, player.y - 8 + bounce, 16, 16);

            // Head
            ctx.fillStyle = '#ffdbac';
            ctx.fillRect(player.x - 6, player.y - 18 + bounce, 12, 12);

            // Hair
            ctx.fillStyle = '#4a3728';
            ctx.fillRect(player.x - 7, player.y - 20 + bounce, 14, 5);

            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(player.x - 4, player.y - 14 + bounce, 2, 2);
            ctx.fillRect(player.x + 2, player.y - 14 + bounce, 2, 2);
        }

        function drawTitle() {
            // Name plate at top
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(300, 40, 300, 90);
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 3;
            ctx.strokeRect(300, 40, 300, 90);

            ctx.font = 'bold 28px Inter';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'center';
            ctx.fillText('KIRILL KUZNETSOV', 450, 75);
        }

        function render() {
            drawBackground();
            drawZones();
            drawFlowers();
            drawTrees();
            drawSigns();
            drawSkillBars();
            drawStars();
            drawChest();
            drawPlayer();
            drawTitle();
        }

        function updatePlayer() {
            if (showingSecret) return;

            let dx = 0, dy = 0;
            if (keys.up) dy = -player.speed;
            if (keys.down) dy = player.speed;
            if (keys.left) dx = -player.speed;
            if (keys.right) dx = player.speed;

            // Normalize diagonal
            if (dx !== 0 && dy !== 0) {
                dx *= 0.707;
                dy *= 0.707;
            }

            const newX = player.x + dx;
            const newY = player.y + dy;

            // Bounds
            if (newX > 20 && newX < canvas.width - 20) player.x = newX;
            if (newY > 140 && newY < canvas.height - 30) player.y = newY;
        }

        function checkCollectibles() {
            stars.forEach(star => {
                if (star.collected) return;
                const dist = Math.sqrt(Math.pow(player.x - star.x, 2) + Math.pow(player.y - star.y, 2));
                if (dist < 25) {
                    star.collected = true;
                    collectedStars++;
                    document.getElementById('collectibles').textContent = `Stars: ${collectedStars}/5`;

                    if (collectedStars === 5) {
                        showSecret("You found all stars! Fun fact: Kirill's first program was a calculator in Pascal, written in 2015.");
                    }
                }
            });
        }

        function openChest() {
            const dist = Math.sqrt(Math.pow(player.x - chest.x - 20, 2) + Math.pow(player.y - chest.y - 15, 2));
            if (dist < 60 && !chest.opened) {
                chest.opened = true;
                showSecret("Bonus info: Besides coding, Kirill enjoys solving algorithmic puzzles and exploring new ML techniques!");
            }
        }

        function showSecret(text) {
            showingSecret = true;
            document.getElementById('secretText').textContent = text;
            document.getElementById('secretPopup').classList.add('show');
        }

        function hideSecret() {
            showingSecret = false;
            document.getElementById('secretPopup').classList.remove('show');
        }

        function gameLoop() {
            updatePlayer();
            checkCollectibles();
            render();
            requestAnimationFrame(gameLoop);
        }

        // Input
        document.addEventListener('keydown', (e) => {
            if (showingSecret) {
                hideSecret();
                return;
            }

            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': keys.up = true; break;
                case 's': case 'arrowdown': keys.down = true; break;
                case 'a': case 'arrowleft': keys.left = true; break;
                case 'd': case 'arrowright': keys.right = true; break;
                case ' ': openChest(); break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': case 'arrowup': keys.up = false; break;
                case 's': case 'arrowdown': keys.down = false; break;
                case 'a': case 'arrowleft': keys.left = false; break;
                case 'd': case 'arrowright': keys.right = false; break;
            }
        });

        // Start
        gameLoop();
    </script>
</body>
</html>
