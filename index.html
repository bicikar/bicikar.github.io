        .burnt-edges {
            position: fixed;

            width: 100%;
            height: 100%;

            box-shadow: inset 0 0 150px rgba(30, 20, 10, 0.8);

            font-size: 22px;
            letter-spacing: 3px;
            text-shadow: 1px 1px 0 rgba(255,250,240,0.5);

            padding: 8px 25px;
            border-radius: 3px;
            border: 2px solid #8b7355;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
        }

        .controls-hint {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);

            font-size: 13px;
            letter-spacing: 1px;
            background: rgba(232, 213, 176, 0.9);
            padding: 5px 15px;
            border-radius: 3px;
            border: 1px solid #8b7355;
        }

        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20,15,10,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .popup-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .popup-content {
            background: linear-gradient(145deg, #e8d5b0, #d4c4a0);
            border: 3px solid #6b5344;
            border-radius: 8px;
            padding: 35px 45px;
            max-width: 480px;
            text-align: center;
            transform: scale(0.9);

            box-shadow: 0 15px 50px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .popup-overlay.active .popup-content {
            transform: scale(1);
        }

        .popup-content h2 {
            font-family: 'Pirata One', cursive;
            color: #3d2914;
            font-size: 24px;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .popup-content p {
            color: #4a3a2a;
            font-size: 15px;
            line-height: 1.7;
        }

        .popup-hint {
            color: #7a6a5a;
            font-size: 11px;
            margin-top: 20px;
            font-style: italic;

    function initDecorations() {

        seaMonsters.push(

                y: Math.random() < 0.5 ? Math.random() * 150 : WORLD.height - Math.random() * 150,

    function toScreen(x, y) {
        return { x: x - camera.x, y: y - camera.y };

    // Drawing functions
    function drawParchmentBackground() {
        // Base parchment color
        const grad = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, canvas.width * 0.8
        );
        grad.addColorStop(0, colors.parchmentLight);
        grad.addColorStop(0.5, colors.parchment);
        grad.addColorStop(1, colors.parchmentDark);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Parchment texture - stains and aging (pre-generated)
        ctx.globalAlpha = 0.03;
        stains.forEach(stain => {
            const s = toScreen(stain.x, stain.y);
            if (s.x < -10 || s.x > canvas.width + 10 || s.y < -10 || s.y > canvas.height + 10) return;
            ctx.fillStyle = stain.color;
            ctx.beginPath();
            ctx.arc(s.x, s.y, stain.size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Larger stains (pre-generated)
        ctx.globalAlpha = 0.02;
        largeStains.forEach(stain => {
            const s = toScreen(stain.x, stain.y);
            if (s.x < -50 || s.x > canvas.width + 50 || s.y < -50 || s.y > canvas.height + 50) return;
            ctx.fillStyle = '#6b5344';
            ctx.beginPath();
            ctx.arc(s.x, s.y, stain.size, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Grid lines (faint)
        ctx.strokeStyle = 'rgba(139, 115, 85, 0.08)';
        ctx.lineWidth = 1;
        const gridSize = 100;
        const offsetX = -camera.x % gridSize;
        const offsetY = -camera.y % gridSize;

        for (let x = offsetX; x < canvas.width; x += gridSize) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = offsetY; y < canvas.height; y += gridSize) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
    }

    function drawWaves() {
        waves.forEach(wave => {
            const s = toScreen(wave.x, wave.y);
            if (s.x < -50 || s.x > canvas.width + 50 || s.y < -50 || s.y > canvas.height + 50) return;

            const wobble = Math.sin(time * 0.5 + wave.phase) * 3;

            ctx.strokeStyle = colors.inkFaded;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(s.x - wave.size, s.y + wobble);
            ctx.quadraticCurveTo(s.x - wave.size * 0.5, s.y - 8 + wobble, s.x, s.y + wobble);
            ctx.quadraticCurveTo(s.x + wave.size * 0.5, s.y + 8 + wobble, s.x + wave.size, s.y + wobble);
            ctx.stroke();
        });
    }

    function drawSeaMonsters() {
        seaMonsters.forEach(monster => {
            const s = toScreen(monster.x, monster.y);
            if (s.x < -150 || s.x > canvas.width + 150 || s.y < -150 || s.y > canvas.height + 150) return;

            ctx.save();
            ctx.translate(s.x, s.y);
            if (monster.flip) ctx.scale(-1, 1);

            const wobble = Math.sin(time * 0.3) * 5;

            if (monster.type === 'serpent') {
                // Sea serpent
                ctx.strokeStyle = colors.inkLight;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';

                // Body waves
                ctx.beginPath();
                ctx.moveTo(0, 0);
                for (let i = 1; i <= 5; i++) {
                    const px = i * 25;
                    const py = Math.sin(i + time * 0.5) * 15;
                    ctx.lineTo(px, py + wobble);
                }
                ctx.stroke();

                // Head
                ctx.fillStyle = colors.inkLight;
                ctx.beginPath();
                ctx.arc(-5, wobble, 12, 0, Math.PI * 2);
                ctx.fill();

                // Eye
                ctx.fillStyle = colors.parchment;
                ctx.beginPath();
                ctx.arc(-8, wobble - 3, 3, 0, Math.PI * 2);
                ctx.fill();

                // Spikes
                ctx.fillStyle = colors.inkFaded;
                for (let i = 0; i < 4; i++) {
                    const px = i * 30 + 10;
                    const py = Math.sin(i + 0.5 + time * 0.5) * 15 + wobble;
                    ctx.beginPath();
                    ctx.moveTo(px - 5, py);
                    ctx.lineTo(px, py - 12);
                    ctx.lineTo(px + 5, py);
                    ctx.fill();
                }
            } else {
                // Kraken tentacles
                ctx.strokeStyle = colors.inkLight;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';

                for (let t = 0; t < 4; t++) {
                    const angle = (t / 4) * Math.PI * 0.6 - Math.PI * 0.3;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);

                    let px = 0, py = 0;
                    for (let i = 1; i <= 4; i++) {
                        px += Math.cos(angle) * 20 + Math.sin(time * 0.5 + t + i) * 8;
                        py += Math.sin(angle) * 20 + Math.cos(time * 0.4 + t + i) * 5;
                        ctx.lineTo(px, py);
                    }
                    ctx.stroke();

                    // Suckers
                    ctx.fillStyle = colors.parchmentDark;
                    for (let i = 1; i <= 3; i++) {
                        const sx = Math.cos(angle) * 20 * i + Math.sin(time * 0.5 + t + i) * 8 * 0.5;
                        const sy = Math.sin(angle) * 20 * i + Math.cos(time * 0.4 + t + i) * 5 * 0.5;
                        ctx.beginPath();
                        ctx.arc(sx, sy, 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Head
                ctx.fillStyle = colors.inkLight;
                ctx.beginPath();
                ctx.ellipse(0, -20, 25, 30, 0, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = colors.gold;
                ctx.beginPath();
                ctx.arc(-10, -25, 5, 0, Math.PI * 2);
                ctx.arc(10, -25, 5, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        });
    }

    function drawCompass() {
        const s = toScreen(compass.x, compass.y);
        if (s.x < -80 || s.x > canvas.width + 80 || s.y < -80 || s.y > canvas.height + 80) return;

        const size = 70;

        // Outer ring
        ctx.strokeStyle = colors.ink;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(s.x, s.y, size, 0, Math.PI * 2);
        ctx.stroke();

        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, size - 8, 0, Math.PI * 2);
        ctx.stroke();

        // Cardinal directions
        const directions = ['N', 'E', 'S', 'W'];
        ctx.font = '16px "Pirata One"';
        ctx.fillStyle = colors.ink;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        directions.forEach((dir, i) => {
            const angle = (i * Math.PI / 2) - Math.PI / 2;
            const dx = s.x + Math.cos(angle) * (size - 20);
            const dy = s.y + Math.sin(angle) * (size - 20);
            ctx.fillText(dir, dx, dy);
        });

        // Compass star
        ctx.fillStyle = colors.ink;
        ctx.beginPath();
        for (let i = 0; i < 8; i++) {
            const angle = (i * Math.PI / 4) - Math.PI / 2;
            const r = i % 2 === 0 ? size - 35 : size - 50;
            const x = s.x + Math.cos(angle) * r;
            const y = s.y + Math.sin(angle) * r;
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.fill();

        // North pointer (red)
        ctx.fillStyle = colors.red;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - size + 35);
        ctx.lineTo(s.x - 6, s.y);
        ctx.lineTo(s.x + 6, s.y);
        ctx.closePath();
        ctx.fill();

        // Center
        ctx.fillStyle = colors.gold;
        ctx.beginPath();
        ctx.arc(s.x, s.y, 6, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawPaths() {
        paths.forEach(path => {
            const from = getLocation(path.from);
            const to = getLocation(path.to);
            if (!from || !to) return;

            const s1 = toScreen(from.x, from.y);
            const s2 = toScreen(to.x, to.y);

            // Dotted line style for treasure map
            ctx.strokeStyle = colors.inkFaded;
            ctx.lineWidth = path.style === 'main' ? 2.5 : 1.5;
            ctx.setLineDash(path.style === 'main' ? [12, 8] : [6, 6]);
            ctx.lineCap = 'round';

            ctx.beginPath();
            ctx.moveTo(s1.x, s1.y);
            ctx.lineTo(s2.x, s2.y);
            ctx.stroke();

            ctx.setLineDash([]);
        });
    }

    function drawLocations() {
        const sorted = [...locations].sort((a, b) => a.y - b.y);

        sorted.forEach(loc => {
            const s = toScreen(loc.x, loc.y);
            if (s.x < -250 || s.x > canvas.width + 250 || s.y < -250 || s.y > canvas.height + 250) return;

            // Location circle with decorative border
            ctx.strokeStyle = colors.ink;
            ctx.lineWidth = 2;

            // Outer decorative circle
            ctx.beginPath();
            ctx.arc(s.x, s.y, loc.radius + 10, 0, Math.PI * 2);
            ctx.stroke();

            // Inner circle
            ctx.strokeStyle = colors.inkFaded;
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.beginPath();
            ctx.arc(s.x, s.y, loc.radius - 5, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // Small decorative marks around circle
            if (loc.type === 'center') {
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const x1 = s.x + Math.cos(angle) * (loc.radius + 5);
                    const y1 = s.y + Math.sin(angle) * (loc.radius + 5);
                    const x2 = s.x + Math.cos(angle) * (loc.radius + 15);
                    const y2 = s.y + Math.sin(angle) * (loc.radius + 15);
                    ctx.strokeStyle = colors.inkFaded;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                }
            }

            // Type-specific decoration
            if (loc.type === 'education') {
                // Book icon
                ctx.fillStyle = colors.inkFaded;
                ctx.fillRect(s.x - 8, s.y - loc.radius + 15, 16, 12);
                ctx.strokeStyle = colors.parchment;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y - loc.radius + 15);
                ctx.lineTo(s.x, s.y - loc.radius + 27);
                ctx.stroke();
            } else if (loc.type === 'experience') {
                // Anchor icon
                ctx.strokeStyle = colors.inkFaded;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(s.x, s.y - loc.radius + 22, 6, Math.PI, 0);
                ctx.moveTo(s.x, s.y - loc.radius + 16);
                ctx.lineTo(s.x, s.y - loc.radius + 35);
                ctx.moveTo(s.x - 8, s.y - loc.radius + 32);
                ctx.lineTo(s.x + 8, s.y - loc.radius + 32);
                ctx.stroke();
            }

            // Content text
            if (loc.content) {
                loc.content.forEach(item => {
                    const font = item.font || 'Spectral';
                    const style = item.italic ? 'italic ' : '';
                    ctx.font = `${style}${item.size}px "${font}", serif`;
                    ctx.textAlign = 'center';
                    ctx.fillStyle = item.color || colors.ink;
                    ctx.fillText(item.text, s.x, s.y + item.y);
                });
            }
        });
    }

    function drawChest() {
        const s = toScreen(chest.x, chest.y);
        if (s.x < -60 || s.x > canvas.width + 60 || s.y < -60 || s.y > canvas.height + 60) return;

        // X marks the spot
        ctx.strokeStyle = colors.red;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(s.x - 25, s.y - 25);
        ctx.lineTo(s.x + 25, s.y + 25);
        ctx.moveTo(s.x + 25, s.y - 25);
        ctx.lineTo(s.x - 25, s.y + 25);
        ctx.stroke();

        if (!chest.opened) {
            // Chest closed
            ctx.fillStyle = colors.inkLight;
            ctx.fillRect(s.x - 20, s.y + 10, 40, 25);

            // Lid
            ctx.beginPath();
            ctx.moveTo(s.x - 22, s.y + 10);
            ctx.quadraticCurveTo(s.x, s.y - 5, s.x + 22, s.y + 10);
            ctx.fill();

            // Lock
            ctx.fillStyle = colors.gold;
            ctx.fillRect(s.x - 5, s.y + 15, 10, 10);

            // Hint
            const dist = Math.hypot(player.x - chest.x, player.y - chest.y);
            if (dist < 80) {
                ctx.font = '12px "Spectral"';
                ctx.fillStyle = colors.red;
                ctx.textAlign = 'center';
                ctx.fillText('SPACE', s.x, s.y + 55);
            }
        } else {
            // Chest open with gold
            ctx.fillStyle = colors.inkLight;
            ctx.fillRect(s.x - 20, s.y + 15, 40, 20);

            // Open lid
            ctx.fillRect(s.x - 22, s.y - 10, 44, 15);

            // Gold coins
            ctx.fillStyle = colors.gold;
            ctx.beginPath();
            ctx.arc(s.x - 8, s.y + 22, 5, 0, Math.PI * 2);
            ctx.arc(s.x + 5, s.y + 20, 6, 0, Math.PI * 2);
            ctx.arc(s.x + 2, s.y + 28, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function drawPlayer() {
        const s = toScreen(player.x, player.y);
        const moving = keys.up || keys.down || keys.left || keys.right;
        const bob = moving ? Math.sin(time * 10) * 2 : 0;

        // Shadow (ink blot style)
        ctx.fillStyle = 'rgba(61, 41, 20, 0.2)';
        ctx.beginPath();
        ctx.ellipse(s.x, s.y + 15, 12, 5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Simple figure (map marker style)
        // Body/cloak
        ctx.fillStyle = colors.ink;
        ctx.beginPath();
        ctx.moveTo(s.x, s.y - 18 + bob);
        ctx.lineTo(s.x - 10, s.y + 12);
        ctx.lineTo(s.x + 10, s.y + 12);
        ctx.closePath();
        ctx.fill();

        // Head
        ctx.fillStyle = colors.parchmentLight;
        ctx.beginPath();
        ctx.arc(s.x, s.y - 22 + bob, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = colors.ink;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(s.x, s.y - 22 + bob, 8, 0, Math.PI * 2);
        ctx.stroke();

        // Hat
        ctx.fillStyle = colors.ink;
        ctx.beginPath();
        ctx.moveTo(s.x - 12, s.y - 26 + bob);
        ctx.lineTo(s.x, s.y - 38 + bob);
        ctx.lineTo(s.x + 12, s.y - 26 + bob);
        ctx.closePath();
        ctx.fill();

        // Eyes
        ctx.fillStyle = colors.ink;
        ctx.beginPath();
        ctx.arc(s.x - 3, s.y - 23 + bob, 1.5, 0, Math.PI * 2);
        ctx.arc(s.x + 3, s.y - 23 + bob, 1.5, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawBorder() {
        // Ornate border
        ctx.strokeStyle = colors.ink;
        ctx.lineWidth = 4;

        // Main border
        const margin = 30;
        const bx = -camera.x + margin;
        const by = -camera.y + margin;
        const bw = WORLD.width - margin * 2;
        const bh = WORLD.height - margin * 2;

        const s1 = toScreen(margin, margin);
        const s2 = toScreen(WORLD.width - margin, WORLD.height - margin);

        if (s1.x < canvas.width && s2.x > 0 && s1.y < canvas.height && s2.y > 0) {
            ctx.strokeRect(
                Math.max(0, s1.x),
                Math.max(0, s1.y),
                Math.min(canvas.width, s2.x) - Math.max(0, s1.x),
                Math.min(canvas.height, s2.y) - Math.max(0, s1.y)
            );

            // Corner decorations
            const corners = [
                { x: margin + 15, y: margin + 15 },
                { x: WORLD.width - margin - 15, y: margin + 15 },
                { x: margin + 15, y: WORLD.height - margin - 15 },
                { x: WORLD.width - margin - 15, y: WORLD.height - margin - 15 },
            ];

            corners.forEach(corner => {
                const sc = toScreen(corner.x, corner.y);
                if (sc.x > -20 && sc.x < canvas.width + 20 && sc.y > -20 && sc.y < canvas.height + 20) {
                    ctx.fillStyle = colors.ink;
                    ctx.beginPath();
                    ctx.arc(sc.x, sc.y, 8, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = colors.gold;
                    ctx.beginPath();
                    ctx.arc(sc.x, sc.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        // Title cartouche at top
        const titleX = WORLD.width / 2;
        const titleY = 80;
        const ts = toScreen(titleX, titleY);

        if (ts.x > -150 && ts.x < canvas.width + 150 && ts.y > -50 && ts.y < canvas.height + 50) {
            // Banner
            ctx.fillStyle = colors.parchmentLight;
            ctx.strokeStyle = colors.ink;
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.moveTo(ts.x - 120, ts.y - 20);
            ctx.lineTo(ts.x + 120, ts.y - 20);
            ctx.lineTo(ts.x + 130, ts.y);
            ctx.lineTo(ts.x + 120, ts.y + 20);
            ctx.lineTo(ts.x - 120, ts.y + 20);
            ctx.lineTo(ts.x - 130, ts.y);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            ctx.font = '22px "Pirata One"';
            ctx.fillStyle = colors.ink;
            ctx.textAlign = 'center';
            ctx.fillText('CURRICULUM VITAE', ts.x, ts.y + 7);
        }
    }

    function render() {
        drawParchmentBackground();
        drawBorder();
        drawWaves();
        drawPaths();
        drawSeaMonsters();
        drawCompass();
        drawLocations();
        drawChest();
        drawPlayer();
    }

    function updateCamera() {
        const targetX = player.x - canvas.width / 2;
        const targetY = player.y - canvas.height / 2;
        camera.x += (targetX - camera.x) * 0.08;
        camera.y += (targetY - camera.y) * 0.08;
        camera.x = Math.max(0, Math.min(camera.x, WORLD.width - canvas.width));
        camera.y = Math.max(0, Math.min(camera.y, WORLD.height - canvas.height));
    }

    function updatePlayer() {
        if (showingPopup) return;

        let dx = 0, dy = 0;
        if (keys.up) dy = -player.speed;
        if (keys.down) dy = player.speed;
        if (keys.left) dx = -player.speed;
        if (keys.right) dx = player.speed;

        if (dx && dy) { dx *= 0.707; dy *= 0.707; }

        const nx = player.x + dx;
        const ny = player.y + dy;

        if (nx > 60 && nx < WORLD.width - 60) player.x = nx;
        if (ny > 60 && ny < WORLD.height - 60) player.y = ny;
    }

    function updateLocationName() {
        let name = 'Карта';
        let minDist = 180;
        locations.forEach(loc => {
            const dist = Math.hypot(player.x - loc.x, player.y - loc.y);
            if (dist < minDist) {
                minDist = dist;
                name = loc.name;
            }
        });
        document.getElementById('locationTitle').textContent = name;
    }

    function openChest() {
        const dist = Math.hypot(player.x - chest.x, player.y - chest.y);
        if (dist < 80 && !chest.opened) {
            chest.opened = true;
            showPopup('СОКРОВИЩЕ', 'Первая программа Кирилла — калькулятор на Pascal (2015). Сейчас он исследует квантовые вычисления с Qiskit и тензорные сети для оптимизационных задач.');
        }
    }

    function showPopup(title, text) {
        showingPopup = true;
        document.getElementById('popupTitle').textContent = title;
        document.getElementById('popupText').textContent = text;
        document.getElementById('popup').classList.add('active');
    }

    function hidePopup() {
        showingPopup = false;
        document.getElementById('popup').classList.remove('active');
    }

    function gameLoop() {
        time += 0.016;
        updatePlayer();
        updateCamera();
        updateLocationName();
        render();
        requestAnimationFrame(gameLoop);
    }

    // Input
    document.addEventListener('keydown', e => {
        if (showingPopup) { hidePopup(); return; }

        const key = e.key.toLowerCase();
        if (['w', 'ц', 'arrowup'].includes(key)) { keys.up = true; e.preventDefault(); }
        if (['s', 'ы', 'arrowdown'].includes(key)) { keys.down = true; e.preventDefault(); }
        if (['a', 'ф', 'arrowleft'].includes(key)) { keys.left = true; e.preventDefault(); }
        if (['d', 'в', 'arrowright'].includes(key)) { keys.right = true; e.preventDefault(); }
        if (key === ' ') { openChest(); e.preventDefault(); }
    });

    document.addEventListener('keyup', e => {
        const key = e.key.toLowerCase();
        if (['w', 'ц', 'arrowup'].includes(key)) keys.up = false;
        if (['s', 'ы', 'arrowdown'].includes(key)) keys.down = false;
        if (['a', 'ф', 'arrowleft'].includes(key)) keys.left = false;
        if (['d', 'в', 'arrowright'].includes(key)) keys.right = false;
    });

    // Start
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;
    gameLoop();
    </script>
</body>
